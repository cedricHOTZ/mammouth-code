<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Mammouth / mammoth silhouette -->
  <!-- Body -->
  <ellipse cx="13" cy="14" rx="7" ry="5.5" />
  <!-- Head -->
  <ellipse cx="6.5" cy="10" rx="3.5" ry="3" />
  <!-- Tusks -->
  <path d="M4 12.5 Q2 14 3 16 Q4 17.5 5.5 16.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Trunk -->
  <path d="M3.5 11.5 Q1 13 2 15.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ear -->
  <ellipse cx="8.5" cy="8.5" rx="2" ry="1.5" />
  <!-- Legs -->
  <rect x="8" y="18" width="2" height="3" rx="1"/>
  <rect x="11" y="18.5" width="2" height="2.5" rx="1"/>
  <rect x="14" y="18.5" width="2" height="2.5" rx="1"/>
  <rect x="17" y="18" width="2" height="3" rx="1"/>
  <!-- Tail -->
  <path d="M20 13 Q23 12 22 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
