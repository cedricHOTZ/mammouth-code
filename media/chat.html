<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'nonce-{{NONCE}}'; script-src 'nonce-{{NONCE}}';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mammouth Code</title>
    <style nonce="{{NONCE}}">
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-foreground);
            background: var(--vscode-sideBar-background);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            padding: 8px 10px;
            border-bottom: 1px solid var(--vscode-sideBarSectionHeader-border, #333);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #header-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--vscode-sideBarSectionHeader-foreground, var(--vscode-foreground));
            opacity: 0.8;
        }

        #new-chat-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--vscode-icon-foreground, var(--vscode-foreground));
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #new-chat-btn:hover {
            opacity: 1;
            background: var(--vscode-toolbar-hoverBackground);
            border-color: var(--vscode-contrastBorder, transparent);
        }

        /* ── Messages ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 10px 4px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb {
            background: var(--vscode-scrollbarSlider-background);
            border-radius: 3px;
        }

        .message {
            border-radius: 6px;
            padding: 9px 11px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message.user {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            align-self: flex-end;
            max-width: 88%;
            border-radius: 12px 12px 2px 12px;
        }

        .message.assistant {
            background: var(--vscode-editor-inactiveSelectionBackground, rgba(255,255,255,0.05));
            border: 1px solid var(--vscode-widget-border, transparent);
            align-self: flex-start;
            width: 100%;
        }

        .message.tool-call {
            background: transparent;
            border: 1px solid var(--vscode-widget-border, rgba(255,255,255,0.1));
            border-left: 3px solid var(--vscode-progressBar-background, #007acc);
            align-self: flex-start;
            width: 100%;
            font-size: 12px;
            border-radius: 0 6px 6px 0;
        }

        .message.error {
            background: var(--vscode-inputValidation-errorBackground, rgba(200,0,0,0.15));
            border: 1px solid var(--vscode-inputValidation-errorBorder, #f44);
            align-self: flex-start;
            width: 100%;
        }

        .message.thinking {
            background: transparent;
            color: var(--vscode-descriptionForeground);
            font-size: 12px;
            font-style: italic;
            align-self: flex-start;
            padding: 4px 8px;
        }

        /* ── Tool call styling ── */
        .tool-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .tool-icon {
            font-size: 13px;
        }

        .tool-name {
            font-weight: 600;
            color: var(--vscode-progressBar-background, #007acc);
            font-size: 12px;
        }

        .tool-args {
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            margin-top: 3px;
        }

        /* ── Markdown elements ── */
        .message pre {
            background: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.3));
            padding: 8px 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: var(--vscode-editor-font-family, monospace);
            font-size: 12px;
            margin: 6px 0;
            white-space: pre-wrap;
        }

        .message code {
            font-family: var(--vscode-editor-font-family, monospace);
            font-size: 12px;
            background: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.3));
            padding: 1px 5px;
            border-radius: 3px;
        }

        .message pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }

        .message strong { font-weight: 600; }
        .message em { font-style: italic; }
        .message p { margin: 4px 0; }
        .message ul, .message ol { margin: 4px 0 4px 18px; }
        .message li { margin: 2px 0; }
        .message h1, .message h2, .message h3 {
            font-weight: 600;
            margin: 8px 0 4px 0;
        }
        .message h1 { font-size: 15px; }
        .message h2 { font-size: 14px; }
        .message h3 { font-size: 13px; }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid var(--vscode-descriptionForeground);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Input area ── */
        #input-area {
            padding: 8px;
            border-top: 1px solid var(--vscode-sideBarSectionHeader-border, #333);
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        #message-input {
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border, rgba(255,255,255,0.1));
            border-radius: 6px;
            padding: 7px 10px;
            font-family: inherit;
            font-size: inherit;
            resize: none;
            min-height: 38px;
            max-height: 140px;
            outline: none;
            line-height: 1.5;
            width: 100%;
        }

        #message-input:focus {
            border-color: var(--vscode-focusBorder, #007acc);
        }

        #message-input::placeholder {
            color: var(--vscode-input-placeholderForeground);
        }

        #input-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
        }

        #hint {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            flex: 1;
        }

        #send-btn {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 4px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
        }

        #send-btn:hover:not(:disabled) {
            background: var(--vscode-button-hoverBackground);
        }

        #send-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="header">
        <span id="header-title">🦣 Mammouth Code</span>
        <button id="new-chat-btn" title="Nouvelle conversation">
            + Nouveau
        </button>
    </div>

    <div id="messages">
        <div class="message assistant" id="welcome-msg">
            Bonjour ! Je suis <strong>Mammouth Code</strong>, votre agent IA.<br><br>
            Je peux lire, créer et modifier vos fichiers, explorer votre projet, et exécuter des commandes.<br><br>
            Comment puis-je vous aider ?
        </div>
    </div>

    <div id="input-area">
        <textarea id="message-input" placeholder="Posez votre question… (Entrée pour envoyer, Shift+Entrée pour sauter une ligne)" rows="1"></textarea>
        <div id="input-actions">
            <span id="hint">Shift+Entrée = nouvelle ligne</span>
            <button id="send-btn">Envoyer</button>
        </div>
    </div>

    <script nonce="{{NONCE}}">
        const vscode = acquireVsCodeApi();
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');

        let isThinking = false;
        let thinkingEl = null;
        let currentAssistantEl = null;

        // ── Utilities ──────────────────────────────────────────────────────

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderMarkdown(raw) {
            // Extract and protect code blocks
            const codeBlocks = [];
            let text = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
                const escaped = escapeHtml(code);
                codeBlocks.push('<pre><code>' + escaped + '</code></pre>');
                return '\x00CODE' + (codeBlocks.length - 1) + '\x00';
            });

            // Escape HTML in remaining text
            text = escapeHtml(text);

            // Inline code
            text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');

            // Bold and italic
            text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
            text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

            // Headings
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Lists
            text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>\n?)+/g, function(m) {
                return '<ul>' + m + '</ul>';
            });

            // Numbered lists
            text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Horizontal rules
            text = text.replace(/^---$/gm, '<hr>');

            // Newlines to <br> (not inside headings/lists)
            text = text.replace(/\n/g, '<br>');

            // Restore code blocks
            text = text.replace(/\x00CODE(\d+)\x00/g, function(_, i) {
                return codeBlocks[parseInt(i)];
            });

            return text;
        }

        function addMessage(html, className) {
            const el = document.createElement('div');
            el.className = 'message ' + className;
            el.innerHTML = html;
            messagesEl.appendChild(el);
            scrollToBottom();
            return el;
        }

        function removeThinking() {
            if (thinkingEl) {
                thinkingEl.remove();
                thinkingEl = null;
            }
        }

        function setThinking(val) {
            isThinking = val;
            sendBtn.disabled = val;
            inputEl.disabled = val;

            if (val && !thinkingEl) {
                thinkingEl = addMessage('<span class="spinner"></span>Mammouth réfléchit…', 'thinking');
            } else if (!val) {
                removeThinking();
            }
        }

        // ── Send message ────────────────────────────────────────────────────

        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || isThinking) return;

            addMessage(escapeHtml(text).replace(/\n/g, '<br>'), 'user');
            inputEl.value = '';
            inputEl.style.height = 'auto';
            currentAssistantEl = null;

            setThinking(true);

            vscode.postMessage({ type: 'send_message', message: text });
        }

        sendBtn.addEventListener('click', sendMessage);

        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        });

        newChatBtn.addEventListener('click', function() {
            messagesEl.innerHTML = '';
            addMessage('Nouvelle conversation. Comment puis-je vous aider ?', 'assistant');
            currentAssistantEl = null;
            vscode.postMessage({ type: 'reset' });
        });

        // ── Handle messages from extension ──────────────────────────────────

        window.addEventListener('message', function(event) {
            const data = event.data;

            switch (data.type) {
                case 'thinking':
                    // Spinner already shown by setThinking(true)
                    break;

                case 'tool_call': {
                    removeThinking();
                    currentAssistantEl = null;

                    // Format args nicely
                    let argsText = '';
                    const args = data.args || {};
                    const keys = Object.keys(args);
                    if (keys.length === 1 && typeof args[keys[0]] === 'string') {
                        argsText = '<span class="tool-args">' + escapeHtml(String(args[keys[0]]).slice(0, 120)) + '</span>';
                    } else if (keys.length > 0) {
                        argsText = '<span class="tool-args">' +
                            keys.map(k => '<strong>' + escapeHtml(k) + '</strong>: ' + escapeHtml(String(args[k]).slice(0, 80))).join('<br>') +
                            '</span>';
                    }

                    addMessage(
                        '<div class="tool-header">' +
                        '<span class="tool-icon">⚙</span>' +
                        '<span class="tool-name">' + escapeHtml(data.name) + '</span>' +
                        '</div>' +
                        argsText,
                        'tool-call'
                    );

                    thinkingEl = addMessage('<span class="spinner"></span>Exécution…', 'thinking');
                    break;
                }

                case 'tool_result': {
                    removeThinking();
                    // Show a "thinking" again while the model processes the result
                    thinkingEl = addMessage('<span class="spinner"></span>Mammouth analyse le résultat…', 'thinking');
                    break;
                }

                case 'message': {
                    removeThinking();
                    if (!currentAssistantEl) {
                        currentAssistantEl = addMessage('', 'assistant');
                    }
                    currentAssistantEl.innerHTML = renderMarkdown(data.content);
                    scrollToBottom();
                    break;
                }

                case 'error': {
                    removeThinking();
                    currentAssistantEl = null;
                    addMessage('⚠ ' + escapeHtml(data.message), 'error');
                    setThinking(false);
                    break;
                }

                case 'done': {
                    currentAssistantEl = null;
                    setThinking(false);
                    break;
                }

                case 'prefill': {
                    inputEl.value = data.message;
                    inputEl.dispatchEvent(new Event('input'));
                    inputEl.focus();
                    break;
                }
            }
        });
    </script>
</body>
</html>
